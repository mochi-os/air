<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        var app = document.querySelector('meta[name="mochi:app"]')
        var fp = document.querySelector('meta[name="mochi:fingerprint"]')
        var domain = document.querySelector('meta[name="mochi:domain"]')
        var base = '/'
        if (domain) base = '/'
        else if (fp && app) base = '/' + app.content + '/' + fp.content + '/'
        else if (fp) base = '/' + fp.content + '/'
        else if (app) base = '/' + app.content + '/'
        else {
          var m = location.pathname.match(/^\/([^/]+)/)
          if (m) base = '/' + m[1] + '/'
        }
        var el = document.createElement('base')
        el.href = base
        document.head.appendChild(el)
      })()
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./images/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Furball - Mochi</title>
    <meta name="description" content="Carrier-based multiplayer air combat." />
    <meta name="theme-color" content="#000" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
